name: generate-snake-game-from-github-contribution-grid

on:
  schedule:
    - cron: "0 */12 * * *"   # se regenera cada 12 horas
  workflow_dispatch: {}       # permite ejecutarlo manualmente desde la pestaña Actions
  push:
    branches:
      - main                 # se regenera también cada vez que haces push a main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: generate-snake-game-from-github-contribution-grid
        uses: Platane/snk@v3.5.0
        with:
          github_user_name: nocturne-cybersecurity
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: push snake svg to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
